<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextcloud - Maintenance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            text-align: center;
        }
        
        .container {
            max-width: 560px;
            padding: 2rem;
        }
        
        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.95;
        }
        
        .footer {
            margin-top: 3rem;
            font-size: 0.95rem;
            opacity: 0.8;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">🔧</div>
            <h1>Nextcloud is under maintenance</h1>
            <p>
                We're performing scheduled maintenance to improve your experience.<br>
                The service will be back shortly.
            </p>
            
            <p style="font-size: 1.1rem; opacity: 0.9;">
                Thank you for your patience.
            </p>
            
            <div class="footer">
                <p>Estimated downtime: Usually less than 30 minutes</p>
                <p>If you need urgent help, contact the administrator.</p>
            </div>
        </div>
    </div>
</body>
</html>
